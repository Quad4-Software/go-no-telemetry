name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.27.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - { platform: linux-amd64, runner: ubuntu-latest, goos: linux, goarch: amd64, build: bash }
          - { platform: linux-arm64, runner: ubuntu-latest, goos: linux, goarch: arm64, build: bash }
          - { platform: linux-armv6, runner: ubuntu-latest, goos: linux, goarch: arm, goarm: "6", build: bash }
          - { platform: linux-armv7, runner: ubuntu-latest, goos: linux, goarch: arm, goarm: "7", build: bash }
          - { platform: linux-386, runner: ubuntu-latest, goos: linux, goarch: 386, build: bash }
          - { platform: linux-riscv64, runner: ubuntu-latest, goos: linux, goarch: riscv64, build: bash }
          # FreeBSD
          - { platform: freebsd-amd64, runner: ubuntu-latest, goos: freebsd, goarch: amd64, build: bash }
          - { platform: freebsd-arm64, runner: ubuntu-latest, goos: freebsd, goarch: arm64, build: bash }
          - { platform: freebsd-386, runner: ubuntu-latest, goos: freebsd, goarch: 386, build: bash }
          - { platform: freebsd-arm, runner: ubuntu-latest, goos: freebsd, goarch: arm, goarm: "7", build: bash }
          # OpenBSD
          - { platform: openbsd-amd64, runner: ubuntu-latest, goos: openbsd, goarch: amd64, build: bash }
          - { platform: openbsd-arm64, runner: ubuntu-latest, goos: openbsd, goarch: arm64, build: bash }
          - { platform: openbsd-386, runner: ubuntu-latest, goos: openbsd, goarch: 386, build: bash }
          - { platform: openbsd-arm, runner: ubuntu-latest, goos: openbsd, goarch: arm, goarm: "7", build: bash }
          - { platform: openbsd-riscv64, runner: ubuntu-latest, goos: openbsd, goarch: riscv64, build: bash }
          # NetBSD
          - { platform: netbsd-amd64, runner: ubuntu-latest, goos: netbsd, goarch: amd64, build: bash }
          - { platform: netbsd-arm64, runner: ubuntu-latest, goos: netbsd, goarch: arm64, build: bash }
          - { platform: netbsd-386, runner: ubuntu-latest, goos: netbsd, goarch: 386, build: bash }
          - { platform: netbsd-arm, runner: ubuntu-latest, goos: netbsd, goarch: arm, goarm: "7", build: bash }
          # DragonFly BSD
          - { platform: dragonfly-amd64, runner: ubuntu-latest, goos: dragonfly, goarch: amd64, build: bash }
          # macOS (native toolchains required)
          - { platform: darwin-amd64, runner: macos-13, goos: darwin, goarch: amd64, build: bash }
          - { platform: darwin-arm64, runner: macos-latest, goos: darwin, goarch: arm64, build: bash }
          # Windows
          - { platform: windows-amd64, runner: windows-latest, goos: windows, goarch: amd64, build: bat }
          - { platform: windows-arm64, runner: windows-latest, goos: windows, goarch: arm64, build: bat }
          - { platform: windows-386, runner: windows-latest, goos: windows, goarch: 386, build: bat }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        if: matrix.build == 'bash'
        with:
          go-version: "1.24.6"

      - uses: actions/setup-go@v5
        if: matrix.build == 'bat'
        with:
          go-version: "1.24.6"

      - name: Set release version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          VER="go${TAG#v}"
          printf '%s\n' "$VER" > VERSION
          printf 'time %s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> VERSION

      - name: Build and pack (Unix)
        if: matrix.build == 'bash'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          PLATFORM: ${{ matrix.platform }}
          GOTOOLCHAIN: local
        run: |
          cd src
          export GOROOT_BOOTSTRAP="$(go env GOROOT)"
          export GOOS="$GOOS"
          export GOARCH="$GOARCH"
          if [ -n "${GOARM:-}" ]; then export GOARM="$GOARM"; fi
          ./make.bash -distpack
          ../bin/go version
          test "$(../bin/go telemetry)" = "off"

      - name: Build and pack (Windows)
        if: matrix.build == 'bat'
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          PLATFORM: ${{ matrix.platform }}
          GOTOOLCHAIN: local
        run: |
          cd src
          export GOROOT_BOOTSTRAP="$(go env GOROOT)"
          export GOOS="$GOOS"
          export GOARCH="$GOARCH"
          cmd //c "call make.bat -distpack"
          ../bin/go version
          test "$(../bin/go telemetry)" = "off"

      - name: Package artifacts
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "$TAG"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release/
          if-no-files-found: error

      - name: Upload source tarball
        if: matrix.platform == 'linux-amd64'
        uses: actions/upload-artifact@v4
        with:
          name: release-src
          path: release/go-no-telemtry-${{ env.TAG }}.src.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'go-no-telemtry-*' -o -name 'SHA256SUMS' \) -exec cp {} release/ \;
          cd release
          sha256sum go-no-telemtry-* > SHA256SUMS
          ls -la

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: go-no-telemtry ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: release/*
